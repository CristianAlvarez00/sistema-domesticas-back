spring.application.name=tareas-domesticas

# 1. Conexion a PostgreSQL (localhost es tu PC)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_tareas_domesticas
spring.datasource.username=postgres
spring.datasource.password=root

# 2. Hibernate: Esta linea crea las tablas automaticamente en tu DB
spring.jpa.hibernate.ddl-auto=update

# 3. Muestra en la consola de IntelliJ las consultas que se hacen
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
